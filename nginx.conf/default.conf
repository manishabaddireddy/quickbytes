server {
    listen 80;
    server_name quickbytes.sytes.net;

    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl;
    server_name quickbytes.sytes.net;

    ssl_certificate /etc/letsencrypt/live/quickbytes.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quickbytes.sytes.net/privkey.pem;


    location / {

        proxy_pass http://app_frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

    }


    location /api/ {

        proxy_pass http://app_backend:5000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

    }
}
