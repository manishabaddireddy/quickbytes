services:
  app_frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend    
    depends_on:
      - app_backend
    restart: always
   
  app_backend:
    build:  
      context: ./backend
      dockerfile: Dockerfile
    container_name: app_backend
    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@app_db:5432/food_delivery
    ports:
      - "5000:5000"
    depends_on:
      - app_db
    restart: always

  app_db:
    image: postgres:16
    container_name: app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: food_delivery
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: always
  nginx:
    image: nginx:latest
    container_name: qb_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app_frontend
      - app_backend
    restart: always

volumes:
  postgres_data:
  

